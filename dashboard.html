<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Jázmin · Control</title>
<style>
  :root{
    --bg:#070b10; --panel:#0d1620; --panel2:#101d2a; --line:#15293a;
    --cyan:#27d3ff; --cyan-dim:#0e7e9e; --text:#cfe8f5; --muted:#5d7a8c;
    --green:#2bd576; --amber:#ffb84d; --red:#ff5d6c; --gold:#ffd166;
  }
  *{box-sizing:border-box}
  body{margin:0;background:radial-gradient(1200px 600px at 70% -10%,#0c1a26 0,var(--bg) 60%);
       color:var(--text);font-family:'Segoe UI',system-ui,sans-serif;font-size:14px}
  header{display:flex;align-items:center;gap:18px;padding:16px 22px;border-bottom:1px solid var(--line);
         position:sticky;top:0;background:rgba(7,11,16,.92);backdrop-filter:blur(8px);z-index:5}
  .logo{font-weight:700;letter-spacing:3px;color:var(--cyan);font-size:18px}
  .logo small{color:var(--muted);letter-spacing:2px;font-weight:400;font-size:11px;margin-left:8px}
  .stats{display:flex;gap:10px;margin-left:auto;flex-wrap:wrap}
  .pill{background:var(--panel);border:1px solid var(--line);border-radius:20px;padding:6px 14px;
        font-size:12px;display:flex;gap:7px;align-items:center}
  .pill b{color:var(--cyan);font-size:14px}
  .dot{width:8px;height:8px;border-radius:50%}
  .safe{cursor:pointer;user-select:none}
  .safe.on{border-color:var(--amber)} .safe.off{border-color:var(--green)}
  .wrap{padding:20px 22px;max-width:1100px;margin:0 auto}
  .toolbar{display:flex;gap:12px;margin-bottom:16px;align-items:center}
  input.search{flex:1;background:var(--panel);border:1px solid var(--line);color:var(--text);
        padding:11px 14px;border-radius:10px;outline:none;font-size:14px}
  input.search:focus{border-color:var(--cyan-dim)}
  .grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(330px,1fr));gap:14px}
  .card{background:linear-gradient(180deg,var(--panel2),var(--panel));border:1px solid var(--line);
        border-radius:14px;padding:15px;transition:.15s}
  .card:hover{border-color:var(--cyan-dim)}
  .card.ppv{border-color:var(--gold);box-shadow:0 0 0 1px rgba(255,209,102,.25)}
  .row1{display:flex;align-items:center;gap:10px}
  .name{font-weight:600;font-size:15px}
  .handle{color:var(--muted);font-size:12px}
  .badges{margin-left:auto;display:flex;gap:6px}
  .badge{font-size:10px;padding:3px 8px;border-radius:10px;text-transform:uppercase;letter-spacing:.5px}
  .b-ppv{background:rgba(255,209,102,.14);color:var(--gold)}
  .b-paused{background:rgba(255,93,108,.14);color:var(--red)}
  .b-active{background:rgba(43,213,118,.12);color:var(--green)}
  .meta{display:flex;gap:16px;color:var(--muted);font-size:12px;margin:10px 0}
  .actions{display:flex;gap:8px;flex-wrap:wrap}
  button{background:var(--panel);border:1px solid var(--line);color:var(--text);
        padding:8px 12px;border-radius:9px;cursor:pointer;font-size:12px;transition:.12s}
  button:hover{border-color:var(--cyan);color:var(--cyan)}
  button.gold:hover{border-color:var(--gold);color:var(--gold)}
  button.red:hover{border-color:var(--red);color:var(--red)}
  button.green:hover{border-color:var(--green);color:var(--green)}
  .note{margin-top:10px;width:100%;background:#0a141d;border:1px solid var(--line);color:var(--text);
        border-radius:9px;padding:8px 10px;font-size:12px;outline:none;resize:vertical;min-height:34px;font-family:inherit}
  .empty{color:var(--muted);text-align:center;padding:50px}
  .flash{position:fixed;bottom:20px;left:50%;transform:translateX(-50%);background:var(--panel2);
        border:1px solid var(--cyan-dim);color:var(--cyan);padding:10px 18px;border-radius:10px;
        opacity:0;transition:.3s;pointer-events:none}
  .flash.show{opacity:1}
</style>
</head>
<body>
<header>
  <div class="logo">⬡ JÁZMIN<small>CONTROL · v11</small></div>
  <div class="stats" id="stats"></div>
</header>
<div class="wrap">
  <div class="toolbar">
    <input class="search" id="search" placeholder="search fans by name / handle…" oninput="render()">
  </div>
  <div class="grid" id="grid"></div>
</div>
<div class="flash" id="flash"></div>

<script>
const PW = new URLSearchParams(location.search).get('pw') || '';
let DATA = {fans:[]};

function flash(t){const f=document.getElementById('flash');f.textContent=t;f.classList.add('show');setTimeout(()=>f.classList.remove('show'),1600);}
async function api(path){ try{const r=await fetch(path+(path.includes('?')?'&':'?')+'key='+encodeURIComponent(PW));return await r.json();}catch(e){return null;} }
async function post(path,body){ try{const r=await fetch(path,{method:'POST',headers:{'Content-Type':'application/json','X-Auth':PW},body:JSON.stringify(body)});return await r.json();}catch(e){return null;} }

async function load(){
  const d = await api('/dashboard_data');
  if(d && d.fans){ DATA=d; renderStats(d); render(); }
}
function renderStats(d){
  const safe = d.safe_mode;
  document.getElementById('stats').innerHTML = `
    <div class="pill safe ${safe?'on':'off'}" onclick="toggleSafe(${safe})">
      <span class="dot" style="background:${safe?'var(--amber)':'var(--green)'}"></span>
      ${safe?'SAFE MODE (not sending)':'LIVE'}
    </div>
    <div class="pill"><span class="dot" style="background:${d.polling_active?'var(--green)':'var(--red)'}"></span>polling</div>
    <div class="pill">fans <b>${d.fan_count}</b></div>
    <div class="pill">pending <b>${d.pending_batches}</b></div>
    <div class="pill">sent today <b>${d.sent_today}</b></div>`;
}
async function toggleSafe(cur){ await api('/safe_mode/'+(cur?'off':'on')); flash(cur?'LIVE — bot is sending':'SAFE MODE — paused'); load(); }

function render(){
  const q=(document.getElementById('search').value||'').toLowerCase();
  const fans=DATA.fans.filter(f=>!q||(f.fan_name||'').toLowerCase().includes(q)||(f.handle||'').toLowerCase().includes(q));
  const g=document.getElementById('grid');
  if(!fans.length){g.innerHTML='<div class="empty">no fans yet</div>';return;}
  g.innerHTML=fans.map(f=>{
    const paused=f.is_paused, ppv=f.ppv_pending;
    const last=f.last_interaction?new Date(f.last_interaction).toLocaleString():'—';
    return `<div class="card ${ppv?'ppv':''}">
      <div class="row1">
        <div><div class="name">${esc(f.fan_name||'unknown')}</div><div class="handle">@${esc(f.handle||'—')}</div></div>
        <div class="badges">
          ${ppv?'<span class="badge b-ppv">PPV pending</span>':''}
          <span class="badge ${paused?'b-paused':'b-active'}">${paused?'paused':'active'}</span>
        </div>
      </div>
      <div class="meta"><span>💬 ${f.total_messages||0} msgs</span><span>🕓 ${last}</span></div>
      <div class="actions">
        ${paused?`<button class="green" onclick="act('/resume/${f.chat_id}','resumed')">▶ resume</button>`
                :`<button class="red" onclick="act('/pause/${f.chat_id}','paused')">⏸ pause</button>`}
        <button class="gold" onclick="act('/ppv_sent/${f.chat_id}','PPV flagged — bot will upsell')">🔓 PPV sent</button>
      </div>
      <textarea class="note" placeholder="per-fan directive (overrides persona)…" onblur="saveNote('${f.chat_id}',this.value)">${esc(f.fan_note||'')}</textarea>
    </div>`;
  }).join('');
}
async function act(path,msg){ await api(path); flash(msg); load(); }
async function saveNote(id,v){ await post('/set_note/'+id,{note:v}); flash('note saved'); }
function esc(s){return (s||'').replace(/[&<>"]/g,c=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;'}[c]));}

load(); setInterval(load, 15000);
</script>
</body>
</html>
